  - m_Id: 13442257788022810
    m_Localized: Мана х Урон
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022811
    m_Localized: Счётчик убийств
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022812
    m_Localized: Переработка
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022813
    m_Localized: Грабёж
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022814
    m_Localized: Карта с монетами
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022815
    m_Localized: Тройной урон
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022817
    m_Localized: Восполните здоровье, когда карта побеждает врага.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022818
    m_Localized: Атаки наносят дополнительный урон, пока карта у вас в руке.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022820
    m_Localized: Если карта снизила бы значение маны до 0, вместо этого получите двойную ману.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022821
    m_Localized: Верните ману при разыгрывании.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022822
    m_Localized: Карта всегда усиливается от комбо.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022824
    m_Localized: Заморозьте случайного врага.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022827
    m_Localized: Призывает вагонетку.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022828
    m_Localized: В-в-вишнёвая бомба.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022829
    m_Localized: Приманите голубку сверху.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022830
    m_Localized: Восполните здоровье после боя.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022831
    m_Localized: Добавьте триггер синего цвета.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022832
    m_Localized: Добавьте триггер красного цвета.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022833
    m_Localized: Добавьте триггер фиолетового цвета.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022834
    m_Localized: Добавьте триггер жёлтого цвета.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022835
    m_Localized: Повысьте боезапас.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022836
    m_Localized: Добавьте броню.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022837
    m_Localized: Стоимость снижается, когда не используется.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022838
    m_Localized: Карта копируется, когда используется.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022839
    m_Localized: Нанесите урон в размере 10% от здоровья врага.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022841
    m_Localized: Вытяните карту.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022842
    m_Localized: Повысьте продолжительность.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022843
    m_Localized: Превратите карту в более мощное оружие.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022846
    m_Localized: Повысьте удачу.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022847
    m_Localized: Если у вас уже есть такая карта, вытяните ещё одну такую же карту.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022848
    m_Localized: Стоимость снижается на 1.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022849
    m_Localized: Стоимость снижается на 2.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022850
    m_Localized: Стоимость повышается на 1, так что её можно использовать на более высоких уровнях комбо.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022851
    m_Localized: Стоимость повышается на 2, так что её можно использовать на более высоких уровнях комбо.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022852
    m_Localized: Повысьте силу.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022853
    m_Localized: Когда карты вытягивается, она остаётся в руке до использования.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022855
    m_Localized: Измените направление движения комбо.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022856
    m_Localized: Карта становится джокером.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022859
    m_Localized: Карта пропускает стопку сброса.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022860
    m_Localized: Зарабатывайте монеты, когда карта побеждает врага.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022861
    m_Localized: Создайте карты с монетами.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13443878056046592
    m_Localized: Область
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13443878056046593
    m_Localized: Повысьте область.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 14468351492349952
    m_Localized: Ндуя
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 14911171215831040
    m_Localized: Нанесите острый урон.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 14908489709203456
    m_Localized: Мягкость
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 14909920461795328
    m_Localized: Кальций
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 14909920461795329
    m_Localized: Нанесите костяной урон.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 14910670638231552
    m_Localized: Радуга
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 14910670638231553
    m_Localized: Добавьте триггеры всех цветов.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 15174246870233088
    m_Localized: Развитие
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 15174246903787520
    m_Localized: Повысьте развитие.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 15174246903787521
    m_Localized: Жадность
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 15174246903787522
    m_Localized: Повысьте жадность.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 15233277626408960
    m_Localized: Огнестойкость
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 15233277672546304
    m_Localized: Призыв бродяг
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 15241736912580608
    m_Localized: Снимите эффект уничтожения.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 15250719622815744
    m_Localized: Эхо
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 15250719660564480
    m_Localized: Повторите эффект предыдущей карты.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 17662590428520448
    m_Localized: Прочность
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 17662590441103360
    m_Localized: Карта меньше подвержена разрушению.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 17789179818618880
    m_Localized: Уничтожение
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 17789179860561920
    m_Localized: Карта сгорает, но даёт монеты.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 19621487362125824
    m_Localized: Кубик
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 19621487362125825
    m_Localized: Получите повтор за каждое 6-е использование.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 50299978445172736
    m_Localized: Позволяет следующей карте продолжить комбо вверх или вниз.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 50299978466144256
    m_Localized: Позволяет продолжить комбо вверх или вниз.
    m_Metadata:
      m_Items:
        Array: []
