    m_Localized: 金币卡牌
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022815
    m_Localized: 三倍伤害
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022817
    m_Localized: 在卡牌击杀敌人时获得治疗。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022818
    m_Localized: 卡牌在你的{GlobalKeywords.Hand}中时，攻击造成额外伤害。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022820
    m_Localized: 如果卡牌会让法力降为0，则改为获得双倍法力。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022821
    m_Localized: 打出时返还法力。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022822
    m_Localized: 卡牌始终会获得连击增益。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022824
    m_Localized: 冰冻一个随机敌人。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022827
    m_Localized: 召唤一辆矿车。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022828
    m_Localized: 樱、樱、樱、樱桃炸弹。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022829
    m_Localized: 从上空召唤一只鸽子。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022830
    m_Localized: 遭遇战后恢复生命值。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022831
    m_Localized: 增加蓝色触发条件。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022832
    m_Localized: 增加红色触发条件。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022833
    m_Localized: 增加紫色触发条件。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022834
    m_Localized: 增加黄色触发条件。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022835
    m_Localized: 增加发射数量。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022836
    m_Localized: 增加防御。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022837
    m_Localized: 未使用时减少法力消耗。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022838
    m_Localized: 使用时复制卡牌。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022839
    m_Localized: 造成相当于敌人生命值10%的伤害。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022841
    m_Localized: 抽一张牌。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022842
    m_Localized: 增加持续时间。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022843
    m_Localized: 将卡牌进化成更加强大的武器。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022846
    m_Localized: 提升运气。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022847
    m_Localized: 如果已有一张此牌，则再抽取一张相同的牌。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022848
    m_Localized: 法力消耗-1。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022849
    m_Localized: 法力消耗-2。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022850
    m_Localized: 法力消耗+1，使其可在更高的{GlobalKeywords.Combo}中使用。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022851
    m_Localized: 法力消耗+2，使其可在更高的{GlobalKeywords.Combo}中使用。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022852
    m_Localized: 提升力量。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022853
    m_Localized: 抽到该卡牌后，其在被使用前一直留在{GlobalKeywords.Hand}中。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022855
    m_Localized: 逆转{GlobalKeywords.Combo}方向。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022856
    m_Localized: 使卡牌成为万能牌。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022859
    m_Localized: 卡牌跳过弃牌堆。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022860
    m_Localized: 在卡牌击杀敌人时获得金币。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13442257788022861
    m_Localized: 生成金币卡牌。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13443878056046592
    m_Localized: 攻击范围
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 13443878056046593
    m_Localized: 扩大攻击范围。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 14468351492349952
    m_Localized: 恩杜亚
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 14911171215831040
    m_Localized: 造成辛辣伤害。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 14908489709203456
    m_Localized: 温和
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 14909920461795328
    m_Localized: 钙质
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 14909920461795329
    m_Localized: 造成骨骼伤害。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 14910670638231552
    m_Localized: 彩虹
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 14910670638231553
    m_Localized: 增加所有颜色触发条件。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 15174246870233088
    m_Localized: 成长
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 15174246903787520
    m_Localized: 提升成长属性。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 15174246903787521
    m_Localized: 贪欲
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 15174246903787522
    m_Localized: 提升贪欲属性。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 15233277626408960
    m_Localized: 防火
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 15233277672546304
    m_Localized: 探索者召唤
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 15241736912580608
    m_Localized: 移除销毁效果。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 15250719622815744
    m_Localized: 回响
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 15250719660564480
    m_Localized: 重新触发上一张牌的效果。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 17662590428520448
    m_Localized: 坚不可摧
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 17662590441103360
    m_Localized: 卡牌粉碎可能性降低。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 17789179818618880
    m_Localized: 销毁
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 17789179860561920
    m_Localized: 卡牌会烧毁，同时提供金币。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 19621487362125824
    m_Localized: 骰子
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 19621487362125825
    m_Localized: 每第6次使用时提供一次{GlobalKeywords.Reroll}机会。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 50299978445172736
    m_Localized: 下一张牌可继续正向或逆向{GlobalKeywords.Combo}。
    m_Metadata:
      m_Items:
        Array:
        - rid: 4841317358791295093
