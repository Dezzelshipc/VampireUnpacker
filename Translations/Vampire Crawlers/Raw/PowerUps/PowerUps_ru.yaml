  m_TableData:
  - m_Id: 1803676626944
    m_Localized: Наносит на {PowerUpValue:N0}% больше урона за каждый ранг.
    m_Metadata:
      m_Items:
        Array:
        - rid: 7336426704161210478
  - m_Id: 84069615731089408
    m_Localized: Повысьте урон.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 1803680821249
    m_Localized: Добавьте {PowerUpValue:N0} брони за каждый ранг.
    m_Metadata:
      m_Items:
        Array:
        - rid: 7336426704161210478
  - m_Id: 84069615756255232
    m_Localized: Понизьте получаемый урон.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 1803680821251
    m_Localized: Повысьте максимальное здоровье на {PowerUpValue:N0}% за каждый ранг.
    m_Metadata:
      m_Items:
        Array:
        - rid: 7336426704161210478
  - m_Id: 84069615756255233
    m_Localized: Повысьте максимальное здоровье.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 4891401596929
    m_Localized: Добавьте {PowerUpValue:N0} маны за каждый ранг.
    m_Metadata:
      m_Items:
        Array:
        - rid: 7336426704161210478
  - m_Id: 84069615756255234
    m_Localized: Добавьте ману.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 4891401596931
    m_Localized: Восполните {PowerUpValue:N0} здоровья за каждый ранг после каждого боя.
    m_Metadata:
      m_Items:
        Array:
        - rid: 7336426704161210478
  - m_Id: 84069615760449536
    m_Localized: Восполните здоровье после каждого боя.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 14110645366784
    m_Localized: Оружие выпускает больше снарядов (на {PowerUpValue:N0}) за каждый ранг.
    m_Metadata:
      m_Items:
        Array:
        - rid: 7336426704161210478
  - m_Id: 84069615760449537
    m_Localized: Оружие выпускает больше снарядов.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 14110645366786
    m_Localized: Атаки наносят разлётный урон. {PowerUpValue:N0}% за каждый ранг.
    m_Metadata:
      m_Items:
        Array:
        - rid: 7336426704161210478
  - m_Id: 84069615760449538
    m_Localized: Разлётный урон.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 23295198048257
    m_Localized: Получите на {PowerUpValue:N0}% больше опыта за каждый ранг.
    m_Metadata:
      m_Items:
        Array:
        - rid: 7336426704161210478
  - m_Id: 84069615760449539
    m_Localized: Получите больше опыта.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 23295198048259
    m_Localized: Получите на {PowerUpValue:N0}% больше монет за каждый ранг.
    m_Metadata:
      m_Items:
        Array:
        - rid: 7336426704161210478
  - m_Id: 84069615760449540
    m_Localized: Получите больше монет.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 23295198048261
    m_Localized: Повышает характеристику {GlobalKeywords.Luck} на {PowerUpValue:N0}% за каждый ранг.
    m_Metadata:
      m_Items:
        Array:
        - rid: 7336426704161210478
  - m_Id: 84069615760449541
    m_Localized: Повышает шанс того, что вам повезёт.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 2192685012168704
    m_Localized: Усильте эффекты вытягивания на {PowerUpValue:N0} {PowerUpValue:p:карту|карты|карт} за каждый ранг.
    m_Metadata:
      m_Items:
        Array:
        - rid: 7336426704161210478
  - m_Id: 84069615760449542
    m_Localized: Увеличивает число карт, вытягиваемых в рамках эффектов.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 2192685012168706
    m_Localized: Повысьте размер руки на {PowerUpValue:N0} за каждый ранг.
    m_Metadata:
      m_Items:
        Array:
        - rid: 7336426704161210478
  - m_Id: 84069615760449543
    m_Localized: Увеличивает характеристику «{GlobalKeywords.Handsize}».
    m_Metadata:
      m_Items:
        Array:
        - rid: 7336426704161210478
  - m_Id: 2283735013732352
    m_Localized: Повысьте продолжительность активных бродяг на {PowerUpValue:N0} за каждый ранг.
    m_Metadata:
      m_Items:
        Array:
        - rid: 7336426704161210478
  - m_Id: 84069615760449544
    m_Localized: '{GlobalKeywords.Crawlers} будут выполнять больше действий, пока они активны.'
    m_Metadata:
      m_Items:
        Array:
        - rid: 7336426704161210478
  - m_Id: 2283735013732354
    m_Localized: Уберите {PowerUpValue:N0} {PowerUpValue:p:карту|карты|карт} за каждый ранг при выборе карт после повышения уровня.
    m_Metadata:
      m_Items:
        Array:
        - rid: 7336426704161210478
  - m_Id: 84069615760449545
    m_Localized: Уберите карты при выборе карт после повышения уровня.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 2283735013732356
    m_Localized: Повторите выбор карт, {PowerUpValue:N0} за каждый ранг.
    m_Metadata:
      m_Items:
        Array:
        - rid: 7336426704161210478
  - m_Id: 84069615760449546
    m_Localized: Повторите выбор карт.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 2283735013732358
    m_Localized: Позволяет не выбирать карты и активировать {GlobalKeywords.Skip}, чтобы вместо этого получить опыт. {PowerUpValue:N0} за каждый ранг.
    m_Metadata:
      m_Items:
        Array:
        - rid: 7336426704161210478
  - m_Id: 84069615760449547
    m_Localized: Позволяет не выбирать карты и активировать {GlobalKeywords.Skip}, чтобы вместо этого получить опыт.
    m_Metadata:
      m_Items:
        Array:
        - rid: 7336426704161210478
  - m_Id: 2541682885210112
    m_Localized: Если вы вот-вот погибнете, вы можете ожить по одному разу за каждый ранг.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 84069615760449548
    m_Localized: Если вы вот-вот погибнете, вы можете ожить.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 18138219010928640
    m_Localized: Повысьте силу врагов на {PowerUpValue:N0}% за каждый ранг, но получите дополнительный опыт.
    m_Metadata:
      m_Items:
        Array:
        - rid: 7336426704161210478
  - m_Id: 84069615760449550
    m_Localized: Повысьте силу врагов, но получите дополнительный опыт.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 43555440361025536
    m_Localized: Получите дополнительную ячейку бродяги за каждый ранг.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 96079886660087808
    m_Localized: Повысьте скорость, здоровье и число врагов на {PowerUpValue:N0}% за каждый ранг.
    m_Metadata:
      m_Items:
        Array:
        - rid: 7336426704161210478
  - m_Id: 170475265769549824
    m_Localized: Наносит дополнительные удары по целям. {PowerUpValue:N0}% за каждый ранг.
    m_Metadata:
      m_Items:
        Array:
        - rid: 7336426704161210478
  - m_Id: 170475265794715648
    m_Localized: Наносит дополнительные удары по целям.
