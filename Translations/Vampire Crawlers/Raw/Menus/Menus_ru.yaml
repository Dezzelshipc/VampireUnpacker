  - m_Id: 190734195120615434
    m_Localized: Пожертвуйте картой, чтобы получить постоянное повышение характеристик.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 190734195120615435
    m_Localized: Пожертвуйте картой, чтобы восполнить здоровье.
    m_Metadata:
      m_Items:
        Array: []
