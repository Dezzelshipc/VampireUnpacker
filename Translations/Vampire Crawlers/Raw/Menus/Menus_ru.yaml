    m_Localized: Карты-джокеры можно использовать для объединения комбо, чтобы создать комбо ещё более высокого уровня.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 158106791638413314
    m_Localized: Объединяйте и продолжайте комбо.
    m_Metadata:
      m_Items:
        Array: []
