  - m_Id: 195455775792902144
    m_Localized: "Нет доступных ячеек для самоцветов.\n\nВозвращайтесь, когда у вас будет больше карт,\nили нажмите «Выбрать деньги», чтобы вместо этого забрать золотые."
    m_Metadata:
