  - m_Id: 187718176982642698
    m_Localized: Обнаружено сохранение для Nintendo Switch
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 187718176982642699
    m_Localized: Мы обнаружили совместимые данные сохранения для Nintendo Switch. Перенести данные на Nintendo Switch 2?
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 187718176982642700
    m_Localized: Импортировать данные сохранения для Nintendo Switch?
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 187718176982642701
    m_Localized: Идёт перенос сохранения для Nintendo Switch
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 187718176982642702
    m_Localized: Мы переносим ваши данные сохранения. Пожалуйста, подождите...
