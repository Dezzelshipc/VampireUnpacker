  - m_Id: 101908280568176640
    m_Localized: В игре есть яркие вспышки света! Если вы испытываете головокружение, ухудшение зрения, подёргивания глаз или лица, дрожь в руках или ногах, дезориентацию, спутанность или кратковременные потери сознания, немедленно прекратите играть и обратитесь к врачу.\n\nЕсли у вас или у кого-либо из ваших родственников в прошлом были эпилептические припадки, проконсультируйтесь с врачом перед игрой.
