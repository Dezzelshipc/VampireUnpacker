  m_TableData:
  - m_Id: 633881047040
    m_Localized: Карта Млечного пути
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 633902018560
    m_Localized: Показывает позиции врагов и многое другое на мини-карте.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 633902018561
    m_Localized: Смурной гримуар
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 633902018562
    m_Localized: Добавляет список открытых улучшений оружия и связок в меню паузы.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 633906212864
    m_Localized: Волшебный расколбас
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 633906212866
    m_Localized: Слёзы чародейки
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 633906212867
    m_Localized: Добавляет кнопку ускорения на карту мира.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 633906212868
    m_Localized: Рандомаззо
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 633906212869
    m_Localized: Добавляет события типа «{GlobalKeywords.Arcana}» в подземелья.
    m_Metadata:
      m_Items:
        Array:
        - rid: 7336426704161210483
  - m_Id: 633906212870
    m_Localized: Стеклянный визард
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 633906212872
    m_Localized: Жёлтый знак
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 633906212874
    m_Localized: Великое Писание
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 633906212876
    m_Localized: Зеркало Грации
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 633906212878
    m_Localized: Отважная история
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 633906212880
    m_Localized: Сверхурон
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 633906212881
    m_Localized: Позволяет атаковать побеждённых боссов, чтобы заработать золото.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 633906212882
    m_Localized: Стопка комбо
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 633906212883
    m_Localized: Разыгрывайте карты в порядке возрастания стоимости ({:color(Mana):{GlobalKeywords.Mana}} {0}), чтобы увеличить множитель комбо.
    m_Metadata:
      m_Items:
        Array:
        - rid: 7336426704161210483
  - m_Id: 633906212884
    m_Localized: Карточный ящик
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 633906212885
    m_Localized: Простая коробочка для колоды карт. За пределы Деревни без такой никуда!
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 633906212886
    m_Localized: Бомба инфернале
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 633906212887
    m_Localized: Мгновенно уничтожает всех врагов на первом этаже подземелья, которое вы уже прошли.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 633906212890
    m_Localized: Рилеваторе
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 633906212891
    m_Localized: Показывает, как оружие повлияет на цели. А ещё выглядит круто!
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 17309176422281216
    m_Localized: Ржавый ключ
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 17309176439058432
    m_Localized: Ржавый ключ от трактира «Гортонский колокол». {:color(Relic):{GlobalKeywords.Crawlers} сами здесь попросятся к вам в отряд.} А пока вы отдыхаете, пропустите кружку-другую парного молока.
    m_Metadata:
      m_Items:
        Array:
        - rid: 7336426704161210483
  - m_Id: 18050765490827264
    m_Localized: Даркассо
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 20545961352835072
    m_Localized: Избыточный урон Ultimate Ultra
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 20545961365417984
    m_Localized: Обходит ограничения реликвии «{db.relic.RelicConfig_Overkill.Name}».
    m_Metadata:
      m_Items:
        Array:
        - rid: 7336426704161210483
  - m_Id: 31106417456918528
    m_Localized: Полентир
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 31106417477890048
    m_Localized: 'Открывает Шатёр предсказаний здесь: {GlobalKeywords.Village}. Идеально подойдёт, если вам нужна {GlobalKeywords.Arcana}.'
    m_Metadata:
      m_Items:
        Array:
        - rid: 7336426704161210483
  - m_Id: 32524480840544256
    m_Localized: Путеводный свет
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 32524480861515776
    m_Localized: Показывает источники света, которые можно уничтожить, на мини-карте.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 50632878304665600
    m_Localized: Сверхкилт
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 50632878321442816
    m_Localized: '{db.relic.RelicConfig_Overkill.Name} срабатывает в любом бою.'
    m_Metadata:
      m_Items:
        Array:
        - rid: 7336426704161210483
  - m_Id: 58306081112186880
    m_Localized: Показывает источники света, которые можно уничтожить, а также {GlobalKeywords.Relics} на мини-карте.
    m_Metadata:
      m_Items:
        Array:
        - rid: 7336426704161210483
  - m_Id: 101974478517383168
    m_Localized: Открывает резерв и отбой.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 73897861531643904
    m_Localized: Самоцветный молот
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 73897861540032512
    m_Localized: Открывает возможность добавлять самоцветы к картам.\nНаходите самоцветы в сундуках или при повышении уровня.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 85855072138899456
    m_Localized: Руководство по бродягам
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 85855072164065280
    m_Localized: Бродяги помогают вам в бою, когда вы разыгрываете карты соответствующего цвета.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 96732797238063104
    m_Localized: Звёздная наковальня
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 96732797263228928
    m_Localized: Открывает мастерскую кузнеца в Деревне.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 96732797267423232
    m_Localized: Лупа ювелира
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 96732797267423233
    m_Localized: Открывает прилавок ювелира в Кузнице.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 139155747105660928
    m_Localized: Добавляет сундуки с арканами в подземелья.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 139227927105449984
    m_Localized: Искатель аркан
    m_Metadata:
      m_Items:
        Array: []
