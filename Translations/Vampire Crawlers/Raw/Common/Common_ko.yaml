    m_Localized: 저장 실패
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 94237927788240896
    m_Localized: 디스크에 저장 데이터를 쓸 수 없습니다.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 94237927788240897
