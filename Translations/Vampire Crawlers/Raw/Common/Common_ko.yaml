    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 94237927788240898
    m_Localized: 디스크에서 저장 파일을 읽을 수 없습니다.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 94237927788240899
    m_Localized: 저장 데이터 손상
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 94237927788240900
    m_Localized: 저장 데이터에서 손상을 감지했습니다.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 779383265505280
    m_Localized: 정말 이 데이터를 삭제하시겠어요?
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 779383328419840
    m_Localized: 던전을 버리고 {GlobalKeywords.Village}로 탈출하시겠습니까?
    m_Metadata:
      m_Items:
        Array:
        - rid: 1496553099325603853
  - m_Id: 779383328419841
    m_Localized: 메인 메뉴로 돌아가시겠습니까?
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 4663173691990016
    m_Localized: 저장되지 않은 변경 사항이 있습니다.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 7491985282686976
    m_Localized: "확인하지 않으면 디스플레이 설정이 이전 상태로 돌아갑니다.\n{0}초 후에 되돌릴 예정…"
    m_Metadata:
      m_Items:
        Array:
        - rid: 1496553099325603853
  - m_Id: 7911158307565568
    m_Localized: "당신은 약간의 두통을 느끼며 마을에서 깨어납니다...\n이전 던전 진행 상황은 꿈이었을까요?\n개발자가 저장 데이터 버전을 변경했나요?\n알게 뭐예요..."
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 19869313610539008
    m_Localized: 컨트롤러 감지되지 않음
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 19869313610539009
    m_Localized: 컨트롤러를 연결하고 확인을 선택하여 계속 진행하십시오
    m_Metadata:
