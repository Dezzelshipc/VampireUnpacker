      m_Items:
        Array: []
  - m_Id: 2090517650202626
    m_Localized: Il vostro scudo, mio signore
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 50305010953494528
    m_Localized: Aggiungi una carta furiosa al tuo {GlobalKeywords.Deck} all'inizio di ogni piano.
    m_Metadata:
      m_Items:
        Array:
        - rid: 1186001538324365323
  - m_Id: 51317535044149248
    m_Localized: Quando un {GlobalKeywords.Crawler} va via, posizionalo in cima al tuo {GlobalKeywords.Deck}.
    m_Metadata:
      m_Items:
        Array:
        - rid: 1186001538324365323
  - m_Id: 2090517650202630
    m_Localized: Infliggi il valore della tua {GlobalKeywords.Armor} come danni alla prima linea dopo aver giocato una carta {GlobalKeywords.Armor}.
    m_Metadata:
      m_Items:
        Array:
        - rid: 1186001538324365323
  - m_Id: 2090517650202631
    m_Localized: Le carte raccolte da fonti di luce ora beneficiano dei moltiplicatori di combo.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 2090517650202632
    m_Localized: L'{GlobalKeywords.Armor} permane tra un turno e il successivo.
    m_Metadata:
      m_Items:
        Array:
        - rid: 1186001538324365323
  - m_Id: 53171049999507456
