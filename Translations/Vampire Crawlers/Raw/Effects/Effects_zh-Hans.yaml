        Array:
        - rid: 1186001538324365339
  - m_Id: 146031819210350592
    m_Localized: 牺牲你的{GlobalKeywords.Armor}以造成伤害。
    m_Metadata:
      m_Items:
        Array:
        - rid: 1186001538324365339
  - m_Id: 146031819252293632
    m_Localized: '{:color(Keyword):护甲攻击}'
    m_Metadata:
      m_Items:
        Array:
        - rid: 1186001538324365339
  - m_Id: 146101541696122880
    m_Localized: '{:color(Keyword):扭打}'
    m_Metadata:
      m_Items:
        Array:
        - rid: 1186001538324365339
  - m_Id: 146101541729677312
    m_Localized: 两只猫碰到时，可能会直接开打。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 146359660930084864
    m_Localized: '{:color(Keyword):{db.Cards.Card_E_LittleHeart.Name}}'
    m_Metadata:
      m_Items:
        Array:
        - rid: 1186001538324365339
  - m_Id: 146384480585592832
    m_Localized: '{:color(Keyword):{db.Cards.Card_B_0_RawMana.Name}}'
    m_Metadata:
      m_Items:
        Array:
        - rid: 1186001538324365339
  - m_Id: 146384480585592833
    m_Localized: 向你的{GlobalKeywords.Hand}中添加一张法力牌。
    m_Metadata:
      m_Items:
        Array:
        - rid: 1186001538324365339
  - m_Id: 146384480585592834
    m_Localized: '{:color(Keyword):{db.Cards.Card_B_0_RawMana.Name}*}'
    m_Metadata:
      m_Items:
        Array:
        - rid: 1186001538324365339
  - m_Id: 146384480585592835
    m_Localized: 向你的{GlobalKeywords.Hand}中添加{ActionValue:p:1张法力牌|{:N0}张法力牌}。
    m_Metadata:
      m_Items:
        Array:
        - rid: 1186001538324365339
  - m_Id: 146453263819943936
    m_Localized: 下一张打出的牌{GlobalKeywords.Mana}消耗-1
    m_Metadata:
      m_Items:
        Array:
        - rid: 1186001538324365339
  - m_Id: 146542921966891008
    m_Localized: '{:color(Keyword):缴械*}'
    m_Metadata:
      m_Items:
        Array:
        - rid: 1186001538324365339
  - m_Id: 146542921966891009
    m_Localized: 有较高几率阻止{ActionValue:N0}次敌方攻击。
    m_Metadata:
      m_Items:
        Array:
        - rid: 1186001538324365339
  - m_Id: 146873999873224704
    m_Localized: '{:color(Keyword):彩虹}'
    m_Metadata:
      m_Items:
        Array:
        - rid: 1186001538324365339
  - m_Id: 146873999923556352
    m_Localized: 触发所有探索者能力。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 146873999923556353
    m_Localized: '{:color(Keyword):温和}'
    m_Metadata:
      m_Items:
        Array:
        - rid: 1186001538324365339
  - m_Id: 146873999923556354
    m_Localized: 从不离开{GlobalKeywords.Hand}，但总会中断{GlobalKeywords.Combo}。
    m_Metadata:
      m_Items:
        Array:
        - rid: 1186001538324365339
  - m_Id: 146873999923556355
    m_Localized: '{:color(Keyword):防火}'
    m_Metadata:
      m_Items:
        Array:
        - rid: 1186001538324365339
  - m_Id: 146873999923556356
    m_Localized: 移除{:color(Keyword):销毁}效果。
    m_Metadata:
      m_Items:
        Array:
        - rid: 1186001538324365339
  - m_Id: 146873999923556357
    m_Localized: '{:color(Keyword):探索者召唤}'
    m_Metadata:
      m_Items:
        Array:
        - rid: 1186001538324365339
  - m_Id: 146873999923556358
    m_Localized: 将所有{GlobalKeywords.Crawlers}召唤到{GlobalKeywords.Hand}中。
    m_Metadata:
      m_Items:
        Array:
        - rid: 1186001538324365339
  - m_Id: 147166005589651456
    m_Localized: '{:color(Keyword):遥控}'
    m_Metadata:
      m_Items:
        Array:
        - rid: 1186001538324365339
  - m_Id: 147166005639983104
    m_Localized: 召唤一辆矿车。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 147166005639983105
    m_Localized: '{:color(Keyword):轰炸}'
    m_Metadata:
      m_Items:
        Array:
        - rid: 1186001538324365339
  - m_Id: 147166005639983106
    m_Localized: 投放一颗樱桃炸弹。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 147166005639983107
    m_Localized: '{:color(Keyword):魔法帽}'
    m_Metadata:
      m_Items:
        Array:
        - rid: 1186001538324365339
  - m_Id: 147166005639983108
    m_Localized: 从上空召唤一只鸽子。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 148542480888881152
    m_Localized: 触发所有探索者主动能力。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 148554586229039104
    m_Localized: '{Count}点{GlobalKeywords.Mana}消耗'
    m_Metadata:
      m_Items:
        Array:
        - rid: 1186001538324365339
  - m_Id: 148554586262593536
    m_Localized: 法力消耗为0时，将生命值减至1。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 148554586262593537
    m_Localized: '{:color(Keyword):一线生机}'
    m_Metadata:
      m_Items:
        Array:
        - rid: 1186001538324365339
  - m_Id: 148554986533367808
    m_Localized: '{:color(Keyword):临时}'
    m_Metadata:
      m_Items:
        Array:
        - rid: 1186001538324365339
  - m_Id: 148554986575310848
    m_Localized: 此牌在该遭遇战结束时消失。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 148561888143204352
    m_Localized: '{GlobalKeywords.Mana}+{0:combo:}'
    m_Metadata:
      m_Items:
        Array:
        - rid: 1186001538324365339
  - m_Id: 149272471666634752
    m_Localized: '{:color(Keyword):钙质}'
    m_Metadata:
      m_Items:
        Array:
        - rid: 1186001538324365339
  - m_Id: 149272471695994880
    m_Localized: 投掷一根骨头。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 151060010056540160
    m_Localized: 冰冻抽取的下一张牌并增加其{GlobalKeywords.Mana}消耗。
    m_Metadata:
      m_Items:
        Array:
        - rid: 1186001538324365339
  - m_Id: 151156358080573440
    m_Localized: '{:color(Keyword):销毁*}'
    m_Metadata:
      m_Items:
        Array:
        - rid: 1186001538324365339
  - m_Id: 151156358122516480
    m_Localized: 使用后立即烧毁，生成{ActionValue:N0}枚金币。
    m_Metadata:
      m_Items:
        Array:
        - rid: 1186001538324365339
  - m_Id: 151437821183254528
    m_Localized: 法力消耗下降，伤害数值提升。法力为{ActionValue:N0}时爆炸！
    m_Metadata:
      m_Items:
        Array:
        - rid: 1186001538324365339
  - m_Id: 151448908024766464
    m_Localized: 受到{ActionValue:N0}点伤害
    m_Metadata:
      m_Items:
        Array:
        - rid: 1186001538324365339
  - m_Id: 151460494206558208
    m_Localized: 受到伤害
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 151463354566696960
    m_Localized: '{:color(Keyword):法力炸弹}'
    m_Metadata:
      m_Items:
        Array:
        - rid: 1186001538324365339
  - m_Id: 151748795029135360
    m_Localized: '{:color(Keyword):坚不可摧}'
    m_Metadata:
      m_Items:
        Array:
        - rid: 1186001538324365339
  - m_Id: 151748795054301184
    m_Localized: 卡牌粉碎可能性降低。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 151887426253434880
    m_Localized: '{:color(Keyword):回响}'
    m_Metadata:
      m_Items:
        Array:
        - rid: 1186001538324365339
  - m_Id: 151887426286989312
    m_Localized: 重新触发上一张牌的效果。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 153602617303314432
    m_Localized: '{:color(Keyword):冻结}'
    m_Metadata:
      m_Items:
        Array:
        - rid: 1186001538324365339
  - m_Id: 153602617349451776
    m_Localized: 法力消耗暂时增加。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 153707637365485568
    m_Localized: 卡牌保留，但打出时需要消耗更多法力。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 153707637365485569
    m_Localized: '{:color(Keyword):掷骰子}'
    m_Metadata:
      m_Items:
        Array:
        - rid: 1186001538324365339
  - m_Id: 153707637365485570
    m_Localized: 每第6次使用时提供一次(keyword reroll???)机会。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 153707637365485571
    m_Localized: 再使用(numberRemaining ???)次后获得一次重选。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 157340544958279680
    m_Localized: '{:color(Keyword):辛辣伤害}'
    m_Metadata:
      m_Items:
        Array:
        - rid: 1186001538324365339
  - m_Id: 170041326634479616
    m_Localized: 飞射物击中次数+{0:combo:%}
    m_Metadata:
      m_Items:
        Array:
        - rid: 1186001538324365339
  - m_Id: 170041326659645440
    m_Localized: 增加飞射物击中次数。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 170041326659645441
    m_Localized: '{:color(Keyword):法力加成}'
    m_Metadata:
      m_Items:
        Array:
        - rid: 1186001538324365339
  - m_Id: 170041326659645442
    m_Localized: 伤害根据当前法力值提高。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 175059392476950528
    m_Localized: 有几率造成多倍伤害。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 175059392523087872
    m_Localized: '{:color(Keyword):暴击}'
    m_Metadata:
      m_Items:
        Array:
        - rid: 1186001538324365339
  - m_Id: 175059392523087873
    m_Localized: 点燃后，每打出一张牌都会提升此牌的伤害。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 175059392523087874
    m_Localized: '{:color(Keyword):瓦尔基里怒火}'
    m_Metadata:
      m_Items:
        Array:
        - rid: 1186001538324365339
  - m_Id: 175059392523087875
    m_Localized: 月光会变得更强，但法力消耗会增加。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 175059392523087876
    m_Localized: '{:color(Keyword):月升}'
    m_Metadata:
      m_Items:
        Array:
        - rid: 1186001538324365339
  - m_Id: 175059392523087877
    m_Localized: '{:color(Keyword):大鸟}'
    m_Metadata:
      m_Items:
        Array:
        - rid: 1186001538324365339
  - m_Id: 175059392523087878
    m_Localized: 驱散敌人上方的鸟，造成更高伤害。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 175089796923731968
    m_Localized: 抽到时法力消耗减少1，打出后重置。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 184386123276955648
    m_Localized: 下一张牌可继续正向或逆向{GlobalKeywords.Combo}。
    m_Metadata:
      m_Items:
        Array:
        - rid: 1186001538324365339
  - m_Id: 184386123302121472
    m_Localized: 连击可正向或逆向继续。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 184386123302121473
    m_Localized: 使用后，每打出一张牌都会提升此牌的伤害。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 185185192261922816
    m_Localized: 有几率向你的{GlobalKeywords.Hand}中添加{ActionValue:p:1张法力牌|{:N0}张法力牌}。
    m_Metadata:
      m_Items:
        Array:
        - rid: 1186001538324365339
  - m_Id: 187402131633811456
    m_Localized: '{:color(Keyword):吸血}'
    m_Metadata:
      m_Items:
        Array:
        - rid: 1186001538324365339
  - m_Id: 187402131667365888
    m_Localized: 在敌人死亡时+{ActionValue:N0}治疗。
    m_Metadata:
      m_Items:
        Array:
        - rid: 1186001538324365339
  - m_Id: 187402131667365889
    m_Localized: 在敌人死亡时获得治疗。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 187402131667365890
    m_Localized: 在敌人死亡时获得{ActionValue:N0}枚{ActionValue:p:金币|金币}。
    m_Metadata:
      m_Items:
        Array:
        - rid: 1186001538324365339
  - m_Id: 187402131667365891
    m_Localized: 在敌人死亡时有几率生成一张治疗牌。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 187402131667365892
    m_Localized: 费用等于剩余{GlobalKeywords.Mana}值。
    m_Metadata:
      m_Items:
        Array:
        - rid: 1186001538324365339
  - m_Id: 191773626099249152
    m_Localized: '{:color(Keyword):{GlobalKeywords.Hand}+}'
    m_Metadata:
      m_Items:
        Array:
        - rid: 1186001538324365339
  - m_Id: 191785002792333312
    m_Localized: 打出时造成相当于{GlobalKeywords.Armor}的伤害。
    m_Metadata:
      m_Items:
        Array:
        - rid: 1186001538324365339
  - m_Id: 191747417810395136
    m_Localized: '{:color(Keyword):割伤}'
    m_Metadata:
      m_Items:
        Array:
        - rid: 1186001538324365339
  - m_Id: 191747417848143872
    m_Localized: 此牌在你的{GlobalKeywords.Hand}中时，打出卡牌会让你受伤。
    m_Metadata:
      m_Items:
        Array:
        - rid: 1186001538324365339
  - m_Id: 195294087462465536
    m_Localized: '{:color(Keyword):X {GlobalKeywords.Mana}}'
    m_Metadata:
      m_Items:
        Array:
        - rid: 1186001538324365339
