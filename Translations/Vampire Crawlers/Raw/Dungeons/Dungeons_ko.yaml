  m_TableData:
  - m_Id: 11823947247616
    m_Localized: '{GlobalKeywords.Village}'
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 11824022745088
    m_Localized: 고튼 마을은 한적하고 정겨운 시골 마을입니다. 겉으로 보이는 평온한 모습에 속지 마세요. 이곳은 영웅과 여걸들이 모이는 용광로나 다름 없으니까요! 모험가의 종착점이죠.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 11824022745089
    m_Localized: 광기의 숲
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 11824022745090
    m_Localized: 한때는 사람들이 밀려들던 안식처였지만 지금은 악의 소굴이 되었습니다. 이 모든 악의 근원은 뱀파이어라고 하지만 대혼란 속에서 구운 닭고기를 얻었으니 횡재 아닙니까.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 12266632501878784
    m_Localized: 분노의 숲
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 12266632527044608
    m_Localized: 숲이 깊어질수록 괴물들은 더욱 섬뜩해집니다. 공기 중에 뭔가가 그들을 미쳐 날뛰게 만드는 게 틀림없어요. 흑마술 때문일지도, 아니면 닭고기의 육질 때문일지도 모르죠.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 12266632527044609
    m_Localized: 광폭의 숲
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 12266632527044610
    m_Localized: 한번 들어가면 심연에서 되돌아 나올 수 없습니다. 나무들 사이로 희미하게 흐느끼는 소리가 들리고, 수천 개의 날개가 퍼드득대는 소리가 뒤섞여 들립니다.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 11824022745091
    m_Localized: 화려한 도서관
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 11824022745092
    m_Localized: 헛수고가 취미인 필경사는 저주에 걸려 모든 것을 알지만 아무것도 이해하지 못합니다. 망망대해 같은 그의 도서관에 가면 통찰력을 얻을 수도 있고... 저주를 받을 수도 있죠. 돌 가면이 그 안에서 끝없이 속삭입니다.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 40868002012160000
    m_Localized: 도서관 서관
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 40868002045714432
    m_Localized: 침입자가 제정신이라면 감히 누구도 속삭이는 소리보다 더 큰 소리로 말할 엄두를 내지 못할 거예요. 이 책꽂이와 저주받은 고서들로 가득한 미로 속에서는 말입니다.  인간의 모습이 아닌 형체들이 복도를 배회하며 오랫동안 묵혀둔 복수를 다짐하고 있거든요.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 40868002045714433
    m_Localized: 도서관 성소
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 40868002045714434
    m_Localized: 한때 세계에서 가장 총명하고 재능 있는 마법사들의 고향이었던 곳입니다. 이제 남은 것은 어둠의 마법, 사악한 사역마, 그리고 그들을 조종하려는 자들뿐입니다.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 11824022745093
    m_Localized: 유제품 공장
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 11824022745094
    m_Localized: 우유 마법의 발상지가 혼돈으로 들끓고 있습니다. 여기서는 피만 덩어리지는 게 아닙니다. 무너진 공장에 용감하게 발을 들여놓는 영웅에게는 크리미한 깜짝 선물이 기다리고 있습니다.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 40868002045714435
    m_Localized: 우유 공장
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 40868002045714436
    m_Localized: 과거에는 부패한 관리들이 사리사욕을 채우기 위해 세금을 횡령하곤 했던 곳입니다. 이제 남은 것이라고는 미로 같은 파이프 뿐입니다. 한때 이곳을 지켰던 거대한 골렘들이 출몰하죠.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 40868002045714437
    m_Localized: 커드 정제소
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 40868002045714438
    m_Localized: 유제품 산업 단지의 중심지이자, 치즈 같은 모험가들이 수없이 많이 자신의 '유청’을 잃었던 곳입니다.  우유에 미친 짐승들과 생짜 우유 마법을 조심하세요.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 11824022745095
    m_Localized: 갈로의 탑
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 11824022745096
    m_Localized: 진보라는 이름으로 공포를 실현한 과학과 마법의 건축물입니다. 많은 유물을 조사하고 실험을 거치면 우리가 원하는 것을 찾을 수 있을지도 모릅니다.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 11824022745097
    m_Localized: 마그나 예배당
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 11824022745098
    m_Localized: 지나치게 높은 곳에서 통치하면서 지나치게 비열했던 그들은 자만했습니다. 이렇게 타락한 순수성이 집결된 곳이라면 백이면 백 뱀파이어를 찾을 수 있을 것입니다. 아마도요.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 40868002045714439
    m_Localized: 울티마 예배당
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 40868002045714440
    m_Localized: 이곳이 바로 물 위에 떠 있는 왕좌의 방입니다. 이 땅의 모든 비극 뒤에서 실을 당기는 꼭두각시 조종자들의 자리죠. 스스로를 신이라 여기면서 부패에 찌들어 사는 자들에게는 딱 어울리는 자리라고 할 수 있습니다.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 5409240946401281
    m_Localized: 소소한 다리
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 5409240946401282
    m_Localized: 이 아담하고 멋진 다리는 건너도 정말 안전할 것 같습니다. 어쨌든 수영보다야 훨씬 나아요.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 5409240946401283
    m_Localized: 미미한 다리
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 5409240946401284
    m_Localized: 이 다리는 이전 다리보다 훨씬 더 작고 조용해 보입니다. 이번에는 틀림없이 평화롭게 건널 수 있을 거예요.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 5409240946401285
    m_Localized: 졸렬한 다리
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 5409240946401286
    m_Localized: 겉보기엔 평범해 보이는 다리지만, 이름은 위협적입니다. 무슨 문제라도 생길까요?
    m_Metadata:
      m_Items:
        Array: []
