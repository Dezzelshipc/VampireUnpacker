  m_TableData:
  - m_Id: 11823947247616
    m_Localized: '{GlobalKeywords.Village}'
    m_Metadata:
      m_Items:
        Array:
        - rid: 1186001538324365349
  - m_Id: 11824022745088
    m_Localized: 戈頓村，一個寧靜、與世隔絕的地方。大家可別被村壯寧靜的景致給騙了。這裡啊，可是英雄與女傑的聚集地喔！更是各路冒險者踏上冒險旅程的起點！
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 11824022745089
    m_Localized: 瘋狂森林
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 11824022745090
    m_Localized: 這裡曾經是欣欣向榮的自然庇護所，如今，卻成了邪惡聚集的溫床。據說，萬惡的根源是一位吸血鬼，但我們卻只尋得混亂的場面以及烤雞。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 12266632501878784
    m_Localized: 狂怒森林
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 12266632527044608
    m_Localized: 越是進到森林深處，怪物們也就變得越加狂躁。一定是空氣中的某種成份快把牠們逼瘋了，也許是黑暗魔法的關係，又或者是烤雞的品質欠佳，嗎？
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 12266632527044609
    m_Localized: 狂暴之林
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 12266632527044610
    m_Localized: 在你踏進了狂暴之林後，你就無法再回頭了。樹林間傳來了微弱的哭喊聲，伴隨著成千上萬種翅膀拍動的聲響。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 11824022745091
    m_Localized: 錦鈿書庫
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 11824022745092
    m_Localized: 空有全天下的知識，身負詛咒的徒然學士仍舊無法理解世間萬物。他無垠無涯的圖書館究竟能帶給我們啟示……還是災難呢？這裡有個石製面具不斷地發出呢喃低語。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 40868002012160000
    m_Localized: 書庫（西廂）
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 40868002045714432
    m_Localized: 在這座由書架與詛咒書卷所構成的迷宮之中，沒有任何一位心智正常的入侵者膽敢高聲喧譁。非人哉的身影會穿梭在圖書館的長廊之中，準備展開久違的復仇。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 40868002045714433
    m_Localized: 書庫（聖所）
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 40868002045714434
    m_Localized: 這裡曾匯聚了全世界最聰明、最有才華的法師。如今，這個地方已淪為黑暗魔法、邪惡魔僕以及那些試圖掌控黑暗之人的庇護之所。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 11824022745093
    m_Localized: 乳製品工廠
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 11824022745094
    m_Localized: 現在，牛奶魔法的誕生地充斥著混沌。在這裡，會凝固的東西可不只有血液喔。在這座崩壞的工廠裡，有張秘密地圖正盼望著一位勇敢的英雄來拯救它。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 40868002045714435
    m_Localized: 牛奶工廠
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 40868002045714436
    m_Localized: 在過去的日子裡，迂腐的官員們都會盯上乳製品工廠並想盡辦法從中作梗並中飽私囊。如今，這裡被剝削到只剩下無窮無盡的管線，而原本尊為乳製品工廠守護者的魔像們，如今也就淪為了掌管這座管線迷宮的夢魘。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 40868002045714437
    m_Localized: 煉乳廠
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 40868002045714438
    m_Localized: 乳製品工業園區的中心地帶，有許多乳臭未乾的冒險者們在這裡迷失了自己前進的方向。各位可要當心啊，你在這裡不僅會接觸到嗜奶成痴的野獸，還有可能會見識到最純粹的牛奶魔法喔。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 11824022745095
    m_Localized: 擎天塔
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 11824022745096
    m_Localized: 在這個鑽研科學與巫術的地方，人們打著進步的旗幟，鑽研著令人毛骨悚然的事務。這裡有著無數的器皿與實驗器材，說不定，我們能在其中找到自己尋尋覓覓的東西。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 11824022745097
    m_Localized: 大教堂
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 11824022745098
    m_Localized: 那些位高權重卻卑躬屈膝的人，都逃不過被欺騙的命運。在這個墮落沉淪的聖地尋找吸血鬼，可說是再適合不過了。應該吧。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 40868002045714439
    m_Localized: 終極大教堂
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 40868002045714440
    m_Localized: 懸浮在空中的王座廳就在這裡。為這片土地帶來一切苦難的幕後黑手就在這裡。對於那些自詡為神卻耽就於腐朽的傢伙來說，這個棲身之所可真是再適合不過了。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 5409240946401281
    m_Localized: 迷你橋
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 5409240946401282
    m_Localized: 一眼看過去，我們應該可以安全通過這座別緻的迷你橋，吧。無論如何，只要有橋能走，肯定都比游泳過河好。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 5409240946401283
    m_Localized: 超迷你橋
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 5409240946401284
    m_Localized: 這座橋似乎比前一座橋還要更小、更恬靜。這次我們肯定能平安無事地過橋了吧。
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 5409240946401285
    m_Localized: 惡意橋
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 5409240946401286
    m_Localized: 一座看似無害，名字卻很嚇人的橋。啊呀，走這座橋肯定不會出事的！安啦！
    m_Metadata:
      m_Items:
        Array: []
