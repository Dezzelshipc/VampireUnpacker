  m_TableData:
  - m_Id: 11823947247616
    m_Localized: '{GlobalKeywords.Village}'
    m_Metadata:
      m_Items:
        Array:
        - rid: 1186001538324365319
  - m_Id: 11824022745088
    m_Localized: Le village de Gorton, un endroit calme et provincial. Ne vous laissez pas avoir par son apparence tranquille, c'est un véritable melting pot de héros et héroïnes ! Le point de départ de tout aventurier qui se respecte.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 11824022745089
    m_Localized: Bois dément
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 11824022745090
    m_Localized: Cet ancien havre de paix a laissé place à un dépotoir démoniaque. Un vampire serait derrière tout ça, mais il n'a laissé derrière lui que l'anarchie et du poulet rôti.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 12266632501878784
    m_Localized: Forêt furieuse
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 12266632527044608
    m_Localized: Plus vous vous enfoncez dans la forêt, plus les monstres deviennent inquiétants. Il y a certainement quelque chose dans l'air qui les rend fous. Peut-être de la magie noire… ou la qualité du poulet rôti.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 12266632527044609
    m_Localized: Bois berserk
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 12266632527044610
    m_Localized: Vous ne pourrez pas faire demi-tour après y avoir pénétré. Un cri étouffé et le battement d'un millier d'ailes se font entendre au milieu des arbres.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 11824022745091
    m_Localized: Bibliothèque
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 11824022745092
    m_Localized: Le Scribe futile sait tout, mais ne comprend rien. Sa bibliothèque infinie pourrait nous aider ou nous condamner à la damnation éternelle. Et ce masque de pierre qui ne cesse de murmurer...
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 40868002012160000
    m_Localized: Aile ouest de la bibliothèque
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 40868002045714432
    m_Localized: Aucun intrus sensé n'oserait hausser la voix dans ce labyrinthe d'étagères et de grimoires maudits. Des formes inhumaines rôdent dans les couloirs, cherchant leur vengeance depuis bien longtemps.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 40868002045714433
    m_Localized: Sanctuaire de la bibliothèque
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 40868002045714434
    m_Localized: Autrefois, il abritait les mages les plus talentueux au monde. Aujourd'hui, on y trouve seulement de la magie noire, d'abominables familiers, et ceux qui cherchent à les contrôler.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 11824022745093
    m_Localized: Usine laitière
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 11824022745094
    m_Localized: Le berceau de la magie lactée glace le sang et rend soupe au lait. Une surprise crémeuse attend l'âme héroïque qui aura l'audace de pénétrer dans cette usine désaffectée.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 40868002045714435
    m_Localized: Fabrique laitière
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 40868002045714436
    m_Localized: Autrefois, des fonctionnaires corrompus y détournaient des fonds, et ça passait crème. Tout ce qui reste désormais est un labyrinthe de tuyaux hanté par les gigantesques golems qui protégeaient autrefois les lieux.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 40868002045714437
    m_Localized: Raffinerie laitière
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 40868002045714438
    m_Localized: L'épicentre du complexe industriel laitier, où plus d'un aventurier a perdu son lait froid. Méfiez-vous de la magie laitière et des bêtes obsédées par le lait.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 11824022745095
    m_Localized: Tour de Gallo
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 11824022745096
    m_Localized: Dans cet édifice scientifico-magique, l'horreur est palpable. Les nombreux artéfacts et sujets d'expériences nous mèneront peut-être dans la bonne direction.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 11824022745097
    m_Localized: Cappella Magna
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 11824022745098
    m_Localized: Ils régnaient d'en haut, mais sont tombés bien bas. Nous ne pourrions pas rêver mieux que ce foyer de pureté souillée pour trouver un vampire. Enfin, ne me prenez pas au mot.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 40868002045714439
    m_Localized: Cappella Ultima
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 40868002045714440
    m_Localized: C'est ici que se trouve la salle flottante du trône, où les maîtres-poupées responsables des malheurs de ces terres tirent leurs ficelles. Un perchoir idéal pour ceux qui se prennent pour des dieux, mais qui croupissent dans la pourriture.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 5409240946401281
    m_Localized: Petit pont
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 5409240946401282
    m_Localized: Ce magnifique petit pont semble parfaitement sûr à traverser. En tous cas, c'est mieux que de nager.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 5409240946401283
    m_Localized: Tout petit pont
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 5409240946401284
    m_Localized: Ce pont a l'air encore plus petit et plus calme que l'autre. Il ne fait aucun doute que vous pourrez le traverser en paix.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 5409240946401285
    m_Localized: Méchant pont
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 5409240946401286
    m_Localized: Un pont à l'air innocent malgré son nom intimidant. Qu'est-ce qui pourrait mal tourner ?
    m_Metadata:
      m_Items:
        Array: []
