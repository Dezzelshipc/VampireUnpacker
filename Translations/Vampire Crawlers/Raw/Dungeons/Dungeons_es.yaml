  m_TableData:
  - m_Id: 11823947247616
    m_Localized: Aldea
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 11824022745088
    m_Localized: La aldea de Gorton es un lugar parroquial y tranquilo. Pero no dejes que su calma te engañe, ¡sirve de punto de encuentro para héroes y heroínas! Es el punto de inicio perfecto para los aventureros.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 11824022745089
    m_Localized: Bosque demente
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 11824022745090
    m_Localized: Lo que una vez fue un refugio próspero ahora es un vertedero para el mal. Dicen que fue obra de un vampiro, pero lo único que hay aquí es caos y pollos asados.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 12266632501878784
    m_Localized: Bosque bélico
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 12266632527044608
    m_Localized: 'Cuanto más te adentras en su maleza, más perturbadores son los monstruos que lo habitan. Debe de haber algo en el ambiente que los vuelve locos: quizá sea magia negra o la calidad de los pollos.'
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 12266632527044609
    m_Localized: Fronda frenética
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 12266632527044610
    m_Localized: No podrás salir de la espesura una vez que te adentres en ella. Se pueden oír gritos ahogados entre los árboles, así como el aleteo de miles de criaturas.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 11824022745091
    m_Localized: Archivo antiguo
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 11824022745092
    m_Localized: Al escriba inútil le echaron la maldición de saberlo todo y no entender nada. Puede que su archivo infinito nos proporcione información... o suponga nuestra perdición. En su interior, una máscara de piedra emite susurros sin cesar.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 40868002012160000
    m_Localized: Ala oeste del archivo
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 40868002045714432
    m_Localized: Ningún intruso en sus cabales se atrevería a hablar sin susurrar en este laberinto de estanterías y tomos malditos. En sus pasillos acechan formas inhumanas que buscan venganza desde hace mucho.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 40868002045714433
    m_Localized: Santuario del archivo
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 40868002045714434
    m_Localized: Otrora fue el hogar de los magos más brillantes y talentosos del mundo. Ahora solo encierra magia negra, viles familiares y aquellos que ansían controlarlos.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 11824022745093
    m_Localized: Central lechera
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 11824022745094
    m_Localized: El lugar donde surgió la magia láctea es un hervidero de caos. Aquí sabrás de primera mano lo que es la mala leche. Una sorpresa cremosa le espera a quien tenga el coraje suficiente para adentrarse en esta factoría derrocada.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 40868002045714435
    m_Localized: Factoría láctea
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 40868002045714436
    m_Localized: Hace mucho, unos agentes corruptos de la leche se llevaron todos los beneficios. Ahora lo único que queda es un laberinto de tuberías que habitan los enormes gólems que una vez lo protegieron.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 40868002045714437
    m_Localized: Refinería de cuajada
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 40868002045714438
    m_Localized: Este es el epicentro del complejo industrial lácteo, donde a muchos aventureros se la han dado con queso. Ojo con las bestias, que quieren darte de leches, y la lactomancia pura.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 11824022745095
    m_Localized: Torre de Gallo
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 11824022745096
    m_Localized: Una construcción para la ciencia y la magia donde se pone de manifiesto el horror en nombre del progreso. Puede que sus muchos artefactos y experimentos nos lleven hasta lo que buscamos.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 11824022745097
    m_Localized: Cappella Magna
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 11824022745098
    m_Localized: Qué presuntuosos quienes gobernaron desde lo más alto y, aun así, cayeron tan bajo. Este nexo de pureza corrompida es el lugar perfecto donde encontrar un vampiro. Probablemente.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 40868002045714439
    m_Localized: Cappella Ultima
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 40868002045714440
    m_Localized: Aquí yace la sala del trono flotante, donde los titiriteros de todos los infortunios de esta tierra mueven los hilos. Una posición adecuada para aquellos que se creen dioses, pero están podridos hasta las cejas.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 5409240946401281
    m_Localized: Puente pito
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 5409240946401282
    m_Localized: Este puentecito parece perfectamente seguro para cruzarlo. Al fin y al cabo, es mejor que ir nadando.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 5409240946401283
    m_Localized: Puente gorgorito
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 5409240946401284
    m_Localized: Parece que este puente es incluso más pequeño y calmado que el anterior. Esta vez, seguro que no será peligroso cruzarlo.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 5409240946401285
    m_Localized: Puente bonito
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 5409240946401286
    m_Localized: Un puente de aspecto inocente y un nombre sencillo. ¿Qué puede salir mal?
    m_Metadata:
      m_Items:
        Array: []
  references:
    version: 2
    RefIds: []

