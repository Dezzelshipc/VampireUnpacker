  m_TableData:
  - m_Id: 11823947247616
    m_Localized: '{GlobalKeywords.Village}'
    m_Metadata:
      m_Items:
        Array:
        - rid: 7336426704161210486
  - m_Id: 11824022745088
    m_Localized: Деревушка Гортон – захудалое местечко, от которого на первый взгляд нечего и ожидать. В реальности же сюда рекой стекаются герои со всего света.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 11824022745089
    m_Localized: Безумный лес
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 11824022745090
    m_Localized: Некогда процветавший райский уголок, ставший настоящей свалкой скверны. В этом принято винить какого-то вампира, но повсюду лишь неразбериха да жареные цыплята.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 12266632501878784
    m_Localized: Яростный лес
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 12266632527044608
    m_Localized: 'Чем глубже в лес, тем страшнее чудовища. Что-то в воздухе толкает их на безумие: или тёмная магия, или протухшая курица.'
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 12266632527044609
    m_Localized: Неистовый лес
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 12266632527044610
    m_Localized: Если вы зашли настолько далеко, пути назад уже нет. Из-за деревьев доносятся сдавленные крики и хлопанье тысячи крыльев.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 11824022745091
    m_Localized: Библиотека
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 11824022745092
    m_Localized: Бесполезный писака обречён всё знать, но ничего не понимать. Его бесконечная библиотека дарует посетителям как озарение, так и проклятие. Откуда-то доносится непрерывный шёпот каменной маски...
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 40868002012160000
    m_Localized: Западное крыло
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 40868002045714432
    m_Localized: Никто не осмелится говорить в полный голос в этом лабиринте книжных полок и проклятых фолиантов. По его залам бродят зловещие сущности, жаждущие давно назревшей мести.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 40868002045714433
    m_Localized: Книжная обитель
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 40868002045714434
    m_Localized: Когда-то здесь обитали талантливейшие из магов. Теперь же не осталось ничего, кроме тёмных сил, злобных фамильяров и пытающихся ими овладеть проходимцев.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 11824022745093
    m_Localized: Молочный завод
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 11824022745094
    m_Localized: Место, где зародилась «молочная магия», и стынет здесь не только кровь в жилах. Героя, которому хватит смелости проникнуть сюда, ждёт сюрприз со сливочными нотками.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 40868002045714435
    m_Localized: Лактозная зона
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 40868002045714436
    m_Localized: Когда-то сливки общества набивали здесь карманы неправедно нажитым богатством. Теперь по этому лабиринту труб рыщут лишь огромные големы, некогда его охранявшие.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 40868002045714437
    m_Localized: Казеиновый тайник
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 40868002045714438
    m_Localized: Святая святых молочного комбината, на пути к которой сгинул не один искатель сыра. Остерегайтесь лактомонстров и потенциального воздействия непастеризованного молока.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 11824022745095
    m_Localized: Башня Галло
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 11824022745096
    m_Localized: Символ науки и колдовства, где во имя прогресса ужасы становятся явью. Что-то из множества её артефактов и плодов научных экспериментов может быть тем, что мы ищем.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 11824022745097
    m_Localized: Капелла Магна
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 11824022745098
    m_Localized: Тщеславны те, кто правит свысока, но пал так низко. В подобных оплотах бездушной праведности обычно и находят вампиров. Вроде как.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 40868002045714439
    m_Localized: Капелла Ультима
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 40868002045714440
    m_Localized: Здесь расположился парящий тронный зал, из которого за ниточки дёргают кукловоды, творящие всё зло в этих землях. Самое место для тех, кто вообразил себя богом, но погряз в гнили.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 5409240946401281
    m_Localized: Небольшой мост
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 5409240946401282
    m_Localized: Похоже, этот не самый большой по размеру мост можно пересечь без особой опасности. Всяко лучше, чем вплавь.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 5409240946401283
    m_Localized: Малый мост
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 5409240946401284
    m_Localized: Кажется, этот мост ещё меньше предыдущего. Скорее всего, перейти его не составит никакого труда.
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 5409240946401285
    m_Localized: Маленький мостик
    m_Metadata:
      m_Items:
        Array: []
  - m_Id: 5409240946401286
    m_Localized: Безобидный на вид мост со зловещим названием. Что вообще может пойти не так?
    m_Metadata:
      m_Items:
        Array: []
